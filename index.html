<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Stream Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .controls { position: absolute; top: 10px; left: 10px; z-index: 20; display: flex; gap: 10px; }
        button { padding: 15px; background: rgba(0,0,0,0.7); border: 1px solid #fff; color: white; border-radius: 8px; font-weight: bold; }

        #interface { position: absolute; bottom: 0; width: 100%; height: 85vh; background: #111; padding: 20px; overflow-y: auto; z-index: 30; }
        .banner { width: 140px; height: 200px; border-radius: 8px; margin-right: 15px; cursor: pointer; object-fit: cover; border: 2px solid #444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 15px; }
        .oculto { display: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="controls">
            <button onclick="document.getElementById('interface').classList.remove('oculto')">🏠 Menu</button>
            <button onclick="toggleFS()">📺 Tela Cheia</button>
        </div>
    </div>

    <div id="interface">
        <h3>Continuando...</h3>
        <div id="last-watched" style="margin-bottom: 20px; padding: 15px; background: #222; border-radius: 8px;">Nenhum histórico</div>
        
        <h3>Séries</h3>
        <div id="banner-container" style="display: flex; overflow-x: auto;"></div>
        <h3>Episódios</h3>
        <div id="btns-eps" class="grid"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        let hls = new Hls();

        const series = [
            { nome: "Tintim", img: "https://static.wikia.nocookie.net/dublagem/images/6/63/Tintim.jpg/revision/latest?cb=20240623151337&path-prefix=pt-br", pasta: "a/as-aventuras-de-tintim-dublado", total: 39, tipo: "zero" },
            { nome: "Yomi", img: "https://imgsrv.crunchyroll.com/cdn-cgi/image/fit=contain,format=auto,quality=85,width=1200,height=675/catalog/crunchyroll/cf01037046bf9885e1ddbc3c1753610e.png", pasta: "y/yomi-no-tsugai", total: 12, tipo: "zero" },
            { nome: "Invencivel", img: "https://i.ytimg.com/vi/Xg8aWV14vSs/maxresdefault.jpg", pasta: "i/invencivel-4-dublado", total: 8, tipo: "zero" },
            { nome: "Pantera", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKlP0fX0wkJMcFT5d2lKmz8j0iBPgHq7wIwBlLfBQbCA&s=10", pasta: "a/a-pantera-cor-de-rosa", total: 129, tipo: "zero" },
            { nome: "One Piece", img: "https://m.media-amazon.com/images/M/MV5BMTNjNGU4NTUtYmVjMy00YjRiLTkxMWUtNzZkMDNiYjZhNmViXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg", pasta: "o/one-piece", total: 1167, start: 1003, tipo: "puro" }
        ];

        // Salvar progresso
        video.ontimeupdate = () => {
            if (video.currentSrc) localStorage.setItem('last_pos', JSON.stringify({url: video.currentSrc, time: video.currentTime}));
        };

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        window.onload = () => {
            let last = JSON.parse(localStorage.getItem('last_pos'));
            if (last) {
                document.getElementById('last-watched').innerHTML = `<button onclick="playVideo('${last.url}')">Continuar de ${Math.floor(last.time/60)} min</button>`;
            }
            // Render Banners
            const container = document.getElementById('banner-container');
            series.forEach(s => {
                let img = document.createElement('img');
                img.src = s.img;
                img.className = 'banner';
                img.onclick = () => renderEps(s);
                container.appendChild(img);
            });
        };

        function renderEps(serie) {
            const listaEps = document.getElementById('btns-eps');
            listaEps.innerHTML = "";
            for (let i = (serie.start || 1); i <= serie.total; i++) {
                let n = (serie.tipo === 'zero' && i < 10) ? "0" + i : i;
                let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${serie.pasta}/${n}.mp4/index.m3u8`;
                let btn = document.createElement('button');
                btn.innerText = i;
                btn.onclick = () => playVideo(url);
                listaEps.appendChild(btn);
            }
        }

        function playVideo(url) {
            if(hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.onloadedmetadata = () => {
                let last = JSON.parse(localStorage.getItem('last_pos'));
                if (last && last.url === url) video.currentTime = last.time;
                video.play();
            };
            document.getElementById('interface').classList.add('oculto');
        }
    </script>
</body>
</html>
