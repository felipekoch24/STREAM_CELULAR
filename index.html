<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STREAM FELIPE MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* 🎥 Tela cheia e controles nativos */
        .video-container { 
            position: relative; 
            width: 100vw; 
            height: 56.25vw; /* Proporção 16:9 */
            max-height: 100vh;
            background: #000;
        }
        video { 
            width: 100%; 
            height: 100%; 
            display: block;
            object-fit: contain;
            background: #000;
        }

        /* 📱 Interface */
        .section-title { padding: 15px; font-weight: bold; background: #1a1a1a; border-bottom: 2px solid #e50914; font-size: 18px; }
        .serie-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .serie-card img { width: 55px; height: 75px; object-fit: cover; border-radius: 4px; margin-right: 12px; }
        .eps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; }
        button { padding: 12px; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 15px; }
        .btn-ativo { background: #e50914 !important; border: 2px solid #fff !important; font-weight: bold; }
        #next-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 999; display: none; text-align: center; padding-top: 120px; }
        #next-overlay h2 { font-size: 22px; margin-bottom: 30px; }
        #next-overlay button { width: 85%; padding: 18px; margin: 8px 0; font-size: 17px; }
        .paginas { display: flex; justify-content: space-between; padding: 15px; gap: 10px; }
        .paginas button { flex: 1; }
        #search-bar { width: 92%; padding: 14px; margin: 12px 4%; border-radius: 8px; border: none; background: #222; color: #fff; font-size: 16px; }
        .item-continuar { display: flex; align-items: center; justify-content: space-between; padding: 12px; margin: 8px 4%; background: #1a1a1a; border-radius: 6px; cursor: pointer; }
        .item-continuar img { width: 45px; height: 60px; border-radius: 4px; margin-right: 10px; }
        .tempo-parado { color: #ffcc00; font-size: 13px; }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- ✅ Controles nativos do Android ativados -->
        <video id="video" playsinline controls controlsList="nodownload"></video>
    </div>

    <div id="next-overlay">
        <h2>Próximo episódio em <span id="count">10</span>s</h2>
        <button onclick="pularAgora()">⏭ PULAR AGORA</button>
        <button onclick="cancelarPulo()">❌ CANCELAR</button>
    </div>

    <div id="interface">
        <input type="text" id="search-bar" placeholder="🔍 PESQUISAR SÉRIE..." oninput="filtrarSeries()">
        
        <div id="div-continuar">
            <div class="section-title">▶ CONTINUAR ASSISTINDO</div>
            <div id="lista-continuar"></div>
        </div>
        
        <div class="section-title">📚 BIBLIOTECA (A-Z)</div>
        <div id="lista-series"></div>
    </div>

    <div id="eps-view" style="display:none;">
        <button style="width:92%; margin:12px 4%; padding:15px; background:#222; border:none; color:white; border-radius:6px;" onclick="voltar()">⬅️ VOLTAR</button>
        <div id="info-serie" style="padding:10px 15px; font-size:16px; color:#ffcc00; font-weight:bold;"></div>
        <div id="btns-eps" class="eps-grid"></div>
        <div class="paginas" id="controles-pagina" style="display:none;">
            <button id="pagina-anterior">⬅ Anterior</button>
            <span id="info-pagina" style="align-self:center;">Página 1</span>
            <button id="pagina-proxima">Próxima ➡</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const listaSeries = document.getElementById('lista-series');
    const listaContinuar = document.getElementById('lista-continuar');
    const overlay = document.getElementById('next-overlay');
    const contadorEl = document.getElementById('count');

    let hls = null, timer = null, episodioAtual = null, serieAtual = null, temporadaAtual = null, paginaAtual = 1;
    const EPISODIOS_POR_PAGINA = 10;
    const MAX_CACHE = 20; // ✅ Máximo de 20 arquivos em cache

    // === CARREGAR E ORDENAR ALFABETICAMENTE ===
    document.addEventListener("DOMContentLoaded", () => {
        carregarHistorico();
        fetch('series.json')
            .then(res => res.json())
            .then(series => {
                series.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { sensitivity: 'base' }));
                series.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'serie-card';
                    div.innerHTML = `<img src="${s.img}" alt="${s.nome}"><span>${s.nome}</span>`;
                    div.onclick = () => { serieAtual = s; verTemporadas(s); };
                    listaSeries.appendChild(div);
                });
            })
            .catch(err => console.error("Erro ao carregar series.json:", err));
    });

    // === SALVAR E CARREGAR HISTÓRICO ===
    function salvarProgresso(url, tempo, nomeSerie, numeroEp, img) {
        const historico = JSON.parse(localStorage.getItem('meu_historico')) || {};
        historico[url] = {
            tempo: Math.round(tempo),
            duracao: Math.round(video.duration || 0),
            nomeSerie,
            numeroEp,
            img,
            ultimaVisualizacao: Date.now()
        };
        localStorage.setItem('meu_historico', JSON.stringify(historico));
        carregarHistorico();
        limparCacheAntigo(); // Mantém só os últimos 20
    }

    function carregarHistorico() {
        const historico = JSON.parse(localStorage.getItem('meu_historico')) || {};
        listaContinuar.innerHTML = "";
        const itens = Object.entries(historico)
            .map(([url, dados]) => ({ url, ...dados }))
            .filter(item => item.tempo > 10 && item.duracao > 0 && (item.tempo / item.duracao) < 0.95)
            .sort((a, b) => b.ultimaVisualizacao - a.ultimaVisualizacao);

        if (itens.length === 0) {
            listaContinuar.innerHTML = `<p style="padding:15px; color:#aaa;">Nenhuma continuação por enquanto</p>`;
            return;
        }

        itens.forEach(item => {
            const porcentagem = Math.round((item.tempo / item.duracao) * 100);
            const minutos = Math.floor(item.tempo / 60);
            const segundos = String(Math.floor(item.tempo % 60)).padStart(2, '0');
            const div = document.createElement('div');
            div.className = 'item-continuar';
            div.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <img src="${item.img}" alt="${item.nomeSerie}">
                    <div>
                        <div>${item.nomeSerie}</div>
                        <div>Ep ${item.numeroEp}</div>
                        <div class="tempo-parado">Retomando em ${minutos}:${segundos} (${porcentagem}%)</div>
                    </div>
                </div>
            `;
            div.onclick = () => tocarEpisodio(item.url, item.tempo, item.nomeSerie, item.numeroEp, item.img);
            listaContinuar.appendChild(div);
        });
    }

    // === LIMPAR CACHE ANTIGO ===
    function limparCacheAntigo() {
        const historico = JSON.parse(localStorage.getItem('meu_historico')) || {};
        const itens = Object.entries(historico).sort((a, b) => b[1].ultimaVisualizacao - a[1].ultimaVisualizacao);
        if (itens.length > MAX_CACHE) {
            const paraRemover = itens.slice(MAX_CACHE);
            paraRemover.forEach(([url]) => {
                delete historico[url];
            });
            localStorage.setItem('meu_historico', JSON.stringify(historico));
        }
    }

    function formatarTempo(segundos) {
        const m = Math.floor(segundos / 60);
        const s = Math.floor(segundos % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // === REPRODUÇÃO DE VÍDEO ===
    function tocarEpisodio(url, tempoInicio = 0, nomeSerie = "", numeroEp = 0, img = "") {
        if (!url) return;
        episodioAtual = { url, tempo: tempoInicio, nome: nomeSerie, numero: numeroEp, img };

        if (hls) { hls.destroy(); hls = null; }

        if (url.includes('.m3u8')) {
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: false,
                backBufferLength: 300,
                maxBufferLength: 60,
                maxMaxBufferLength: 1200,
                maxBufferSize: 150 * 1000 * 1000, // 150MB de cache
                xhrSetup: function(xhr) {
                    xhr.withCredentials = false;
                    xhr.setRequestHeader('Origin', window.location.origin);
                    xhr.setRequestHeader('Referer', window.location.href);
                }
            });

            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                if (tempoInicio > 0) video.currentTime = tempoInicio;
                video.play().catch(e => console.log("Autoplay bloqueado:", e));
            });
        } else {
            video.src = url;
            video.load();
            video.onloadedmetadata = () => {
                if (tempoInicio > 0) video.currentTime = tempoInicio;
                video.play().catch(e => console.log("Erro ao reproduzir:", e));
            };
        }

        // Salva progresso automaticamente
        video.ontimeupdate = () => {
            const atual = video.currentTime;
            const total = video.duration || 0;
            if (!video.paused && total > 10) {
                salvarProgresso(url, atual, nomeSerie, numeroEp, img);
            }
        };

        // Quando acabar
        video.onended = () => {
            mostrarContagemProximo();
        };

        destacarEpisodioAtual(numeroEp);
        window.scrollTo(0, 0);
    }

    // === NAVEGAÇÃO ===
    function verTemporadas(serie) {
        document.getElementById('interface').style.display = 'none';
        document.getElementById('eps-view').style.display = 'block';
        document.getElementById('info-serie').innerText = serie.nome;
        const grid = document.getElementById('btns-eps');
        grid.innerHTML = "";
        document.getElementById('controles-pagina').style.display = 'none';

        if (serie.temporadas && serie.temporadas.length > 0) {
            serie.temporadas.forEach(temp => {
                const btn = document.createElement('button');
                btn.innerText = `Temporada ${temp.n}`;
                btn.style.background = "#e50914";
                btn.onclick = () => { temporadaAtual = temp; carregarEpisodios(temp); };
                grid.appendChild(btn);
            });
        } else {
            temporadaAtual = serie;
            carregarEpisodios(serie);
        }
    }

    function carregarEpisodios(temp, pagina = 1) {
        paginaAtual = pagina;
        const inicio = temp.start || 1;
        const totalEp = temp.total;
        const indiceInicio = (pagina - 1) * EPISODIOS_POR_PAGINA;
        const fim = Math.min(indiceInicio + EPISODIOS_POR_PAGINA, totalEp);

        const grid = document.getElementById('btns-eps');
        grid.innerHTML = "";

        for (let i = indiceInicio; i < fim; i++) {
            const numeroEp = inicio + i;
            const epFormatado = String(numeroEp).padStart(2, '0');
            const url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${temp.pasta}/${epFormatado}.mp4/index.m3u8`;

            const btn = document.createElement('button');
            btn.innerText = numeroEp;
            btn.dataset.ep = numeroEp;
            btn.onclick = function() {
                tocarEpisodio(url, 0, serieAtual.nome, numeroEp, serieAtual.img);
            };
            grid.appendChild(btn);
        }

        const controles = document.getElementById('controles-pagina');
        controles.style.display = totalEp > EPISODIOS_POR_PAGINA ? 'flex' : 'none';
        document.getElementById('info-pagina').innerText = `Página ${pagina} de ${Math.ceil(totalEp / EPISODIOS_POR_PAGINA)}`;
        document.getElementById('pagina-anterior').disabled = pagina === 1;
        document.getElementById('pagina-anterior').onclick = () => carregarEpisodios(temp, pagina - 1);
        document.getElementById('pagina-proxima').disabled = fim >= totalEp;
        document.getElementById('pagina-proxima').onclick = () => carregarEpisodios(temp, pagina + 1);

        destacarEpisodioAtual();
    }

    function destacarEpisodioAtual(numeroAtual = null) {
        document.querySelectorAll('.eps-grid button').forEach(b => b.classList.remove('btn-ativo'));
        if (!numeroAtual && episodioAtual) numeroAtual = episodioAtual.numero;
        if (numeroAtual) {
            const botao = document.querySelector(`.eps-grid button[data-ep="${numeroAtual}"]`);
            if (botao) botao.classList.add('btn-ativo');
        }
    }

    // === PRÓXIMO EPISÓDIO ===
    function mostrarContagemProximo() {
        overlay.style.display = 'block';
        let contagem = 10;
        contadorEl.innerText = contagem;

        const contador = setInterval(() => {
            contagem--;
            contadorEl.innerText = contagem;
            if (contagem <= 0) {
                clearInterval(contador);
                pularAgora();
            }
        }, 1000);
    }

    function pularAgora() {
        overlay.style.display = 'none';
        if (!episodioAtual || !temporadaAtual) return;

        const proximoNumero = episodioAtual.numero + 1;
        const inicio = temporadaAtual.start || 1;
        const total = temporadaAtual.total;

        if (proximoNumero > inicio + total - 1) {
            alert("Último episódio da temporada!");
            return;
        }

        const epFormatado = String(proximoNumero).padStart(2, '0');
        const novaUrl = `https://cdn-s01.mywallpaper-4k-image.net/stream/${temporadaAtual.pasta}/${epFormatado}.mp4/index.m3u8`;
        tocarEpisodio(novaUrl, 0, serieAtual.nome, proximoNumero, serieAtual.img);
    }

    function cancelarPulo() {
        overlay.style.display = 'none';
        video.play();
    }

    // === OUTRAS FUNÇÕES ===
    function voltar() {
        video.pause();
        document.getElementById('interface').style.display = 'block';
        document.getElementById('eps-view').style.display = 'none';
        carregarHistorico();
    }

    function filtrarSeries() {
        const termo = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('.serie-card').forEach(card => {
            const nome = card.querySelector('span').innerText.toLowerCase();
            card.style.display = nome.includes(termo) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
