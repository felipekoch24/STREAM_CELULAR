<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STREAM FELIPE MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        video::-webkit-media-controls { display: flex !important; }
        button:active { background: #e50914 !important; transform: scale(0.95); }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        video { width: 100%; height: 250px; background: #000; display: block; }
        .section-title { padding: 15px; font-weight: bold; background: #1a1a1a; border-bottom: 2px solid #e50914; }
        .serie-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .serie-card img { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        .eps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        button { padding: 12px; background: #333; color: #fff; border: none; border-radius: 4px; }
        #next-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; display: none; text-align: center; padding-top: 100px; }
        .btn-ativo { background: #e50914 !important; border: 2px solid #fff !important; font-weight: bold; }
    </style>
</head>
<body>
    <video id="video" playsinline controls></video>

    <div id="next-overlay">
        <h2>Próximo em <span id="count">10</span>s</h2>
        <button onclick="pularAgora()" style="width:80%; padding:20px; background:#e50914;">PULAR AGORA</button>
        <button onclick="cancelarPulo()" style="width:80%; margin-top:10px; padding:15px;">CANCELAR</button>
    </div>

    <div id="interface">
        <button onclick="iniciarNostalgia()" style="width:100%; padding:20px; background:#e50914; color:white; border:none; font-weight:bold; margin-bottom:10px;">📺 SESSÃO NOSTALGIA</button>
        <input type="text" id="search-bar" placeholder="🔍 PESQUISAR SÉRIE..." onkeyup="filtrarSeries()" style="width:90%; padding:15px; margin: 10px 5%; border-radius: 8px; border:none; background:#333; color:white;">
        
        <div id="div-continuar" style="display:none;" class="section-title"></div>
        
        <div class="section-title">BIBLIOTECA</div>
        <div id="lista-series"></div>
    </div>

    <div id="eps-view" style="display:none;">
        <button style="width:100%; padding:15px; background:#222; border:none; color:white;" onclick="voltar()">⬅️ VOLTAR</button>
        <div id="btns-eps" class="eps-grid"></div>
    </div>

<script>
    const video = document.getElementById('video');
    const listaSeries = document.getElementById('lista-series');
    const listaComerciais = ["vinheta1.mp4", "intervalo1.mp4", "intervalo2.mp4", "propaganda1.mp4", "propaganda2.mp4", "propaganda3.mp4"];
    
    let hls = null, timer = null, lastBtn = null, modoAleatorio = false, tocandoComercial = false, currentSerieImg = "";
video.onended = () => {
    if (!modoAleatorio) {
        document.getElementById('next-overlay').style.display = 'block';
        let c = 10;
        document.getElementById('count').innerText = c;
        timer = setInterval(() => {
            c--; 
            document.getElementById('count').innerText = c;
            if(c <= 0) pularAgora();
        }, 1000);
    }
};
    document.addEventListener("DOMContentLoaded", function() {
        carregarHistorico();
    });

    fetch('series.json').then(res => res.json()).then(series => {
        series.forEach(s => {
            let div = document.createElement('div');
            div.className = 'serie-card';
            div.innerHTML = `<img src="${s.img}"> <span>${s.nome}</span>`;
            div.onclick = () => { currentSerieImg = s.img; verEps(s); };
            listaSeries.appendChild(div);
        });
    });

    function playVideo(url, time = 0, btn = null, nomeSerie = "Desconhecido") {
    if (btn) lastBtn = btn; 

    // Recupera o histórico como uma ARRAY (lista), não como objeto
    let historico = JSON.parse(localStorage.getItem('meu_historico')) || [];
    
    // Cria um objeto de registro
    let novoRegistro = { 
        url: url,
        nome: nomeSerie, 
        time: video.currentTime, 
        img: currentSerieImg, 
        timestamp: Date.now() 
    };

    // Adiciona ao topo da lista (os mais recentes primeiro)
    historico.unshift(novoRegistro);
    
    // Limita o histórico aos últimos 20 itens para não pesar o navegador
    if (historico.length > 20) historico.pop();

    localStorage.setItem('meu_historico', JSON.stringify(historico));

    // ... (restante do código de HLS e play) ...
}
    function continuarAssistindo() {
        let last = JSON.parse(localStorage.getItem('meu_historico'));
        if (last) {
            currentSerieImg = meu_historico.img;
            playVideo(meu_historico.url, meu_historico.time);
        }
    }

  function carregarHistorico() {
    let historico = JSON.parse(localStorage.getItem('meu_historico')) || [];
    let div = document.getElementById('div-continuar');
    
    if (historico.length > 0) {
        div.style.display = 'block';
        div.innerHTML = '<div class="section-title">CONTINUAR ASSISTINDO</div>';
        
        // Exibe os itens salvos
        historico.forEach(item => {
            div.innerHTML += `
                <button onclick="playVideo('${item.url}', ${item.time})" style="width:100%; display:flex; align-items:center; background:#1a1a1a; margin-bottom:5px;">
                    <img src="${item.img}" style="width:50px; height:70px; margin-right:10px;">
                    <div style="text-align:left;">
                        <div style="font-size:12px;">${item.nome}</div>
                        <div style="font-size:10px; color:#888;">RETOMAR EP.</div>
                    </div>
                </button>`;
        });
    }
}

    function filtrarSeries() {
        let input = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('.serie-card').forEach(card => {
            card.style.display = card.querySelector('span').innerText.toLowerCase().includes(input) ? 'flex' : 'none';
        });
    }

    function iniciarNostalgia() {
    modoAleatorio = true;
    tocandoComercial = false;
    // Garante que temos os dados antes de sortear
    fetch('series.json').then(res => res.json()).then(series => {
        let s = series[Math.floor(Math.random() * series.length)];
        let alvo = s.temporadas ? s.temporadas[Math.floor(Math.random() * s.temporadas.length)] : s;
        let ep = Math.floor(Math.random() * alvo.total) + (alvo.start || 1);
        let n = (ep < 10 && !alvo.start) ? "0" + ep : ep;
        currentSerieImg = s.img; // Sincroniza a capa
        playVideo(`https://cdn-s01.mywallpaper-4k-image.net/stream/${alvo.pasta}/${n}.mp4/index.m3u8`);
    });
}
    function pularAgora() {
    clearInterval(timer);
    document.getElementById('next-overlay').style.display = 'none';
    // Procura o próximo botão na grade de episódios
    if(lastBtn && lastBtn.nextElementSibling) {
        lastBtn.nextElementSibling.click();
    }
}

    function cancelarPulo() {
        clearInterval(timer);
        document.getElementById('next-overlay').style.display = 'none';
    }

    function voltar() {
        clearInterval(timer); // Garante que nenhum timer fique rodando
        document.getElementById('next-overlay').style.display = 'none';
        document.getElementById('interface').style.display = 'block';
        document.getElementById('eps-view').style.display = 'none';
    }
    function verEps(s) {
        document.getElementById('interface').style.display = 'none';
        document.getElementById('eps-view').style.display = 'block';
        const grid = document.getElementById('btns-eps');
        grid.innerHTML = "";
        if (s.temporadas) {
            s.temporadas.forEach(temp => {
                let btn = document.createElement('button');
                btn.innerText = "TEMP " + temp.n;
                btn.style.background = "#e50914";
                btn.onclick = () => carregarEpisodiosDaTemp(temp);
                grid.appendChild(btn);
            });
        } else {
            carregarEpisodiosDaTemp(s);
        }
    }

    function carregarEpisodiosDaTemp(item) {
        const grid = document.getElementById('btns-eps');
        grid.innerHTML = "";
        const inicio = item.start || 1;
        for (let i = inicio; i <= item.total; i++) {
            let n = (i < 10 && !item.start) ? "0" + i : i;
            let url = `https://cdn-s01.mywallpaper-4k-image.net/stream/${item.pasta}/${n}.mp4/index.m3u8`;
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.onclick = function() { 
                modoAleatorio = false; 
                playVideo(url, 0, this); 
                document.querySelectorAll('.eps-grid button').forEach(b => b.classList.remove('btn-ativo'));
                this.classList.add('btn-ativo');
            };
            grid.appendChild(btn);
        }
    }
</script>
</body>
</html>
