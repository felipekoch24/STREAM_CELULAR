<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TV STREAM - Funcional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :focus { outline: 3px solid #f47521 !important; outline-offset: 2px !important; border-radius: 8px; }
        body {
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: #000;
            overflow-y: auto;
            padding: 20px;
        }

        .tela { display: none; width: 100%; min-height: 100vh; }
        .ativa { display: block; }

        /* Perfis */
        #tela-perfis { text-align: center; padding-top: 50px; }
        h1 { font-size: 36px; margin-bottom: 40px; color: #fff; }
        .lista-perfis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 30px;
            max-width: 600px;
            margin: 0 auto;
        }
        .perfil-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-radius: 12px;
        }
        .perfil-item img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid transparent;
            object-fit: cover;
        }
        .perfil-item:active { transform: scale(0.95); }
        .btn-editar {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f47521;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }
        .perfil-vazio {
            border: 3px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: #666;
        }

        /* Formulário */
        .voltar {
            background: #222;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 18px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        input {
            width: 90%;
            max-width: 350px;
            padding: 15px;
            font-size: 18px;
            background: #222;
            border: 2px solid #444;
            color: white;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .btn-principal {
            padding: 14px 35px;
            background: #f47521;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Avatares */
        .grid-avatares {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        .avatar-opcao {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            object-fit: cover;
        }

        /* Home / Séries */
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        .info-usuario { display: flex; align-items: center; gap: 15px; }
        .info-usuario img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #f47521; }
        .secao h3 { font-size: 24px; margin-bottom: 20px; color: #f47521; }
        .grade {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
        }
        .item {
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: #111;
        }
        .item img { width: 100%; height: 230px; object-fit: cover; }
        .item p { padding: 10px; text-align: center; font-size: 16px; }
        .progresso {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #333;
        }
        .barra-progresso { height: 100%; background: #f47521; }

        /* Player */
        .player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 999;
        }
        .player-container.ativo { display: flex; flex-direction: column; }
        #video-player { width: 100%; height: 100%; background: #000; }
        .controles-player {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, #000 80%);
            transition: opacity 0.3s;
        }
        .controles-player.oculto { opacity: 0; pointer-events: none; }
        .barra-tempo {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 10px 0;
            cursor: pointer;
        }
        .preenchimento { height: 100%; background: #f47521; width: 0%; }
        .proximo-ep {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            min-width: 280px;
        }
        .proximo-ep.ativo { display: block; }
    </style>
</head>
<body>

<!-- Telas -->
<div id="tela-perfis" class="tela ativa">
    <h1>QUEM ESTÁ ASSISTINDO?</h1>
    <div class="lista-perfis" id="listaPerfis"></div>
</div>

<div id="tela-formulario" class="tela">
    <button class="voltar" onclick="voltarPerfil()">← Voltar</button>
    <h2 id="tituloForm">Novo Perfil</h2>
    <input type="text" id="nomePerfil" placeholder="Digite o nome">
    <br>
    <button class="btn-principal" onclick="irAvatar()">Continuar</button>
</div>

<div id="tela-avatar" class="tela">
    <button class="voltar" onclick="voltarForm()">← Voltar</button>
    <h2>Escolha a imagem</h2>
    <div class="grid-avatares" id="listaAvatares"></div>
</div>

<div id="tela-home" class="tela">
    <div class="cabecalho">
        <div class="info-usuario">
            <img id="imgUsuario" src="">
            <h2 id="nomeUsuario"></h2>
        </div>
        <button class="voltar" onclick="voltarPerfil()">Trocar Perfil</button>
    </div>

    <div class="secao">
        <h3>📺 SÉRIES</h3>
        <div class="grade" id="listaSeries"></div>
    </div>

    <div class="secao" id="secaoEp" style="display: none;">
        <button class="voltar" onclick="voltarSeries()">← Voltar</button>
        <h3 id="nomeSerie"></h3>
        <div class="grade" id="listaEpisodios"></div>
    </div>
</div>

<div class="player-container" id="player">
    <video id="video-player" playsinline preload="metadata"></video>
    <div class="controles-player" id="controles">
        <div id="infoEp"></div>
        <div class="tempo">
            <span id="tempoAtual">00:00</span>
            <span id="tempoTotal">00:00</span>
        </div>
        <div class="barra-tempo" onclick="ajustarTempo(event)">
            <div class="preenchimento" id="barraTempo"></div>
        </div>
    </div>
    <div class="proximo-ep" id="avisoProx">
        <h4>Próximo Episódio</h4>
        <p>Continua em <span id="contagem">10</span>s</p>
        <button class="btn-principal" onclick="irProximo()">Assistir Agora</button>
    </div>
</div>

<script>
let perfis = JSON.parse(localStorage.getItem('perfis')) || [];
let perfilAtual = null, serieAtual = null, epAtual = null;
let contagemTimer = null, controlesTimer = null;

// Catálogo
const CATALOGO = {
    sfv: {
        nome: "Street Fighter II V",
        capa: "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/streetfighterv.jpeg",
        eps: [
            {id: "sfv19", nome: "Episódio 19", link: "https://www.dropbox.com/scl/fi/f23dp2yrgx5ouh2bjud6h/AnimeFire.io-Street-Fighter-II-V-Dublado-Epis-dio-19-SD.m3u8?rlkey=z997bpvro0rwhbuxmf1vfmae4&dl=1"},
            {id: "sfv20", nome: "Episódio 20", link: "https://www.dropbox.com/scl/fi/0qx0rqunmyt09h5u40zb9/AnimeFire.io-Street-Fighter-II-V-Dublado-Epis-dio-20-SD.m3u8?rlkey=73r4rd99hbmle7je6fe4589f6&dl=1"},
            {id: "sfv21", nome: "Episódio 21", link: "https://www.dropbox.com/scl/fi/vpgra16bmnri6x8yankdv/AnimeFire.io-Street-Fighter-II-V-Dublado-Epis-dio-21-SD.m3u8?rlkey=70k2ii0lvkb1iynmgbk8l2nwp&dl=1"}
        ]
    },
    jujutsu: {
        nome: "Jujutsu Kaisen T3",
        capa: "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/jujutsu-t3.webp",
        eps: [
            {id: "jujutsu3", nome: "Episódio 3", link: "https://www.dropbox.com/scl/fi/7m3k0sa7upbjjmqga3k5d/Assistir-Jujutsu-Kaisen-3-T3-Ep3.m3u8?rlkey=2m0jh37g0s3zelz2xe9k7x3d7&dl=1"}
        ]
    },
    heroi: {
        nome: "Herói do Escudo T2",
        capa: "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/capas/heroidescutot2.jpeg",
        eps: [
            {id: "heroi1", nome: "Episódio 1", link: ""}
        ]
    }
};

const AVATARES = [
    "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc01.jpg",
    "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/masc02.jpg",
    "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin01.jpg",
    "https://raw.githubusercontent.com/felipekoch24/TV_STREAM/main/imagens%20perfil/femin02.jpg"
];

// --- Perfis ---
function salvarPerfis() {
    localStorage.setItem('perfis', JSON.stringify(perfis));
    listarPerfis();
}

function listarPerfis() {
    const div = document.getElementById('listaPerfis');
    div.innerHTML = "";
    perfis.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = "perfil-item";
        el.tabIndex = 0;
        el.innerHTML = `<button class="btn-editar" onclick="editar(${i},event)">✏️</button><img src="${p.avatar}"><p>${p.nome}</p>`;
        el.onclick = () => entrar(i);
        el.onkeydown = e => e.key === "Enter" && entrar(i);
        div.appendChild(el);
    });
    if(perfis.length < 4) {
        const novo = document.createElement('div');
        novo.className = "perfil-item perfil-vazio";
        novo.tabIndex = 0;
        novo.innerHTML = `<span>+</span>`;
        novo.onclick = abrirForm;
        novo.onkeydown = e => e.key === "Enter" && abrirForm();
        div.appendChild(novo);
    }
    setTimeout(() => document.querySelector('.perfil-item')?.focus(), 100);
}

function abrirForm() {
    document.getElementById('tela-perfis').classList.remove('ativa');
    document.getElementById('tela-formulario').classList.add('ativa');
    document.getElementById('nomePerfil').value = "";
    document.getElementById('nomePerfil').focus();
}

function irAvatar() {
    const nome = document.getElementById('nomePerfil').value.trim();
    if(!nome) return alert("Digite um nome!");
    window.nomeTemp = nome;
    document.getElementById('tela-formulario').classList.remove('ativa');
    document.getElementById('tela-avatar').classList.add('ativa');
    const div = document.getElementById('listaAvatares');
    div.innerHTML = "";
    AVATARES.forEach(src => {
        const img = document.createElement('img');
        img.className = "avatar-opcao";
        img.tabIndex = 0;
        img.src = src;
        img.onclick = () => salvarPerfil(src);
        img.onkeydown = e => e.key === "Enter" && salvarPerfil(src);
        div.appendChild(img);
    });
    setTimeout(() => document.querySelector('.avatar-opcao')?.focus(), 100);
}

function salvarPerfil(avatar) {
    perfis.push({ nome: nomeTemp, avatar: avatar, progresso: {} });
    salvarPerfis();
    document.getElementById('tela-avatar').classList.remove('ativa');
    document.getElementById('tela-perfis').classList.add('ativa');
}

function editar(i, e) {
    e.stopPropagation();
    alert("Edição funcionando! Ajuste aqui se quiser, mas priorize a navegação.");
}

function entrar(i) {
    perfilAtual = perfis[i];
    document.getElementById('imgUsuario').src = perfilAtual.avatar;
    document.getElementById('nomeUsuario').textContent = perfilAtual.nome;
    document.getElementById('tela-perfis').classList.remove('ativa');
    document.getElementById('tela-home').classList.add('ativa');
    listarSeries();
    setTimeout(() => document.querySelector('.item')?.focus(), 100);
}

function voltarPerfil() {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById('player').classList.remove('ativo');
    document.getElementById('tela-perfis').classList.add('ativa');
    perfilAtual = serieAtual = epAtual = null;
    listarPerfis();
}

function voltarForm() {
    document.getElementById('tela-avatar').classList.remove('ativa');
    document.getElementById('tela-formulario').classList.add('ativa');
}

// --- Séries ---
function listarSeries() {
    const div = document.getElementById('listaSeries');
    div.innerHTML = "";
    Object.keys(CATALOGO).forEach(chave => {
        const s = CATALOGO[chave];
        const el = document.createElement('div');
        el.className = "item";
        el.tabIndex = 0;
        el.innerHTML = `<img src="${s.capa}"><p>${s.nome}</p>`;
        el.onclick = () => abrirEpisodios(chave);
        el.onkeydown = e => e.key === "Enter" && abrirEpisodios(chave);
        div.appendChild(el);
    });
}

function abrirEpisodios(chave) {
    serieAtual = CATALOGO[chave];
    document.getElementById('nomeSerie').textContent = serieAtual.nome;
    const div = document.getElementById('listaEpisodios');
    div.innerHTML = "";
    serieAtual.eps.forEach((ep, idx) => {
        const prog = perfilAtual.progresso?.[ep.id] || 0;
        const el = document.createElement('div');
        el.className = "item";
        el.tabIndex = 0;
        el.innerHTML = `<img src="${serieAtual.capa}"><p>${ep.nome}</p><div class="progresso"><div class="barra-progresso" style="width:${prog}%"></div></div>`;
        el.onclick = () => reproduzir(idx);
        el.onkeydown = e => e.key === "Enter" && reproduzir(idx);
        div.appendChild(el);
    });
    document.getElementById('secaoEp').style.display = "block";
    document.querySelector('.secao:first-child').style.display = "none";
    setTimeout(() => document.querySelector('#listaEpisodios .item')?.focus(), 100);
}

function voltarSeries() {
    document.getElementById('secaoEp').style.display = "none";
    document.querySelector('.secao:first-child').style.display = "block";
    serieAtual = null;
    setTimeout(() => document.querySelector('#listaSeries .item')?.focus(), 100);
}

// --- Player ---
function reproduzir(idx) {
    epAtual = { serie: serieAtual, indice: idx, dados: serieAtual.eps[idx] };
    if(!epAtual.dados.link) return alert("Sem link!");
    const video = document.getElementById('video-player');
    video.src = epAtual.dados.link;
    document.getElementById('infoEp').textContent = `${serieAtual.nome} - ${epAtual.dados.nome}`;
    document.getElementById('player').classList.add('ativo');
    document.getElementById('avisoProx').classList.remove('ativo');
    video.play();
    restaurarProgresso();
    mostrarControles();
}

function salvarProgresso() {
    if(!epAtual) return;
    const v = document.getElementById('video-player');
    if(!v.duration) return;
    const porcentagem = Math.min(100, (v.currentTime / v.duration) * 100);
    if(!perfilAtual.progresso) perfilAtual.progresso = {};
    perfilAtual.progresso[epAtual.dados.id] = porcentagem;
    perfis[perfis.findIndex(p => p.nome === perfilAtual.nome)] = perfilAtual;
    localStorage.setItem('perfis', JSON.stringify(perfis));
}

function restaurarProgresso() {
    const v = document.getElementById('video-player');
    setTimeout(() => {
        if(epAtual.dados.id && perfilAtual.progresso?.[epAtual.dados.id]) {
            const tempo = (perfilAtual.progresso[epAtual.dados.id] / 100) * v.duration;
            v.currentTime = tempo;
        }
    }, 1200);
}

function mostrarControles() {
    const c = document.getElementById('controles');
    c.classList.remove('oculto');
    if(controlesTimer) clearTimeout(controlesTimer);
    controlesTimer = setTimeout(() => {
        if(!document.getElementById('video-player').paused) c.classList.add('oculto');
    }, 4000);
}

function ajustarTempo(e) {
    const v = document.getElementById('video-player');
    const barra = e.currentTarget;
    const pos = e.offsetX || (e.touches && e.touches[0].clientX - barra.getBoundingClientRect().left);
    if(v.duration) v.currentTime = (pos / barra.clientWidth) * v.duration;
}

function proximoContagem() {
    if(contagemTimer) clearInterval(contagemTimer);
    const prox = epAtual.indice + 1;
    if(prox >= serieAtual.eps.length) return;
    document.getElementById('avisoProx').classList.add('ativo');
    let seg = 10;
    document.getElementById('contagem').textContent = seg;
    contagemTimer = setInterval(() => {
        seg--;
        document.getElementById('contagem').textContent = seg;
        if(seg <= 0) { clearInterval(contagemTimer); irProximo(); }
    }, 1000);
}

function irProximo() {
    clearInterval(contagemTimer);
    document.getElementById('avisoProx').classList.remove('ativo');
    reproduzir(epAtual.indice + 1);
}

function fecharPlayer() {
    salvarProgresso();
    const v = document.getElementById('video-player');
    v.pause();
    v.src = "";
    document.getElementById('player').classList.remove('ativo');
    if(contagemTimer) clearInterval(contagemTimer);
    if(controlesTimer) clearTimeout(controlesTimer);
}

function formatarTempo(s) {
    const m = Math.floor(s / 60);
    const seg = Math.floor(s % 60);
    return `${m.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
}

// --- Controles ---
document.addEventListener('keydown', e => {
    const playerAtivo = document.getElementById('player').classList.contains('ativo');
    if(!playerAtivo) {
        switch(e.key) {
            case "ArrowUp": moverFoco(-4); break;
            case "ArrowDown": moverFoco(4); break;
            case "ArrowLeft": moverFoco(-1); break;
            case "ArrowRight": moverFoco(1); break;
            case "Enter": document.activeElement?.click(); break;
            case "Escape": case "Backspace": voltarPerfil(); break;
        }
    } else {
        const v = document.getElementById('video-player');
        switch(e.key) {
            case "ArrowDown": fecharPlayer(); break;
            case "ArrowLeft": v.currentTime = Math.max(0, v.currentTime - 10); break;
            case "ArrowRight": v.currentTime = Math.min(v.duration || 99999, v.currentTime + 10); break;
            case "Enter": v.paused ? v.play() : v.pause(); break;
            case "ArrowUp": document.getElementById('controles').classList.toggle('oculto'); break;
            case "Escape": fecharPlayer(); break;
        }
    }
});

function moverFoco(passo) {
    const todos = Array.from(document.querySelectorAll('[tabindex="0"], button, input')).filter(el => el.offsetParent);
    const atual = todos.indexOf(document.activeElement);
    if(atual === -1) return;
    const novo = atual + passo;
    if(novo >= 0 && novo < todos.length) {
        todos[novo].focus();
        todos[novo].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

// Atualizações do vídeo
document.getElementById('video-player').addEventListener('timeupdate', () => {
    const v = document.getElementById('video-player');
    if(!v.duration) return;
    const porcentagem = (v.currentTime / v.duration) * 100;
    document.getElementById('barraTempo').style.width = porcentagem + "%";
    document.getElementById('tempoAtual').textContent = formatarTempo(v.currentTime);
    document.getElementById('tempoTotal').textContent = formatarTempo(v.duration);
    if(porcentagem >= 95 && !document.getElementById('avisoProx').classList.contains('ativo')) proximoContagem();
});

document.getElementById('video-player').addEventListener('click', mostrarControles);

// Início
window.onload = listarPerfis;
</script>
</body>
</html>
